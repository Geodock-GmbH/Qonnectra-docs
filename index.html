<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Qonnectra Docs – Preview Environments</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, -apple-system, sans-serif; max-width: 640px; margin: 0 auto; padding: 2rem 1.5rem; background: #f6f8fa; color: #1f2328; line-height: 1.5; }
    .container { background: #fff; border-radius: 12px; padding: 2rem; box-shadow: 0 1px 3px rgba(0,0,0,.08); }
    h1 { font-size: 1.5rem; font-weight: 600; color: #1f2328; margin: 0 0 0.25rem 0; }
    .subtitle { color: #656d76; font-size: 0.95rem; margin-bottom: 1.5rem; }
    .section { margin-bottom: 1.5rem; }
    .section:last-child { margin-bottom: 0; }
    .section h2 { font-size: 0.8rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #656d76; margin: 0 0 0.75rem 0; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { margin: 0.5rem 0; }
    a { display: block; padding: 0.75rem 1rem; border-radius: 8px; color: #0969da; text-decoration: none; font-weight: 500; transition: background 0.15s; }
    a:hover { background: #eaeef2; text-decoration: none; }
    .branch a, .pr a { border-left: 3px solid #11ba81; }
    .header { display: flex; align-items: center; gap: 1rem; margin-bottom: 1rem; }
    .header img { height: 40px; width: auto; }
  </style>
</head>
<body>
  <div class="container">
    <header class="header">
      <img src="images/qonnectra_logo.png" alt="Qonnectra" />
      <h1>Qonnectra Docs</h1>
    </header>
    <p class="subtitle">Available preview environments — click to view deployed documentation</p>
    <div class="section">
      <h2>Branch previews</h2>
      <ul class="branch-list">
        <li class="branch"><a href="branch-main/">main (default)</a></li>
      </ul>
    </div>
    <div class="section">
      <h2>Pull request previews</h2>
      <ul class="pr-list">
      </ul>
    </div>
  </div>
</body>
</html>
