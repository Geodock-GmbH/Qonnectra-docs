name: Deploy PR Preview

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

env:
  PREVIEW_ID: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('branch-{0}', github.ref_name) }}

# Allow concurrent preview deployments
concurrency:
  group: preview-${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || format('branch-{0}', github.ref_name) }}
  cancel-in-progress: true

jobs:
  build-preview:
    runs-on: ubuntu-latest
    if: |
      (github.event_name == 'pull_request' && github.event.pull_request.head.ref != 'gh-pages-preview') ||
      github.event_name == 'push'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: true
      
      - name: Build with VitePress
        run: pnpm run build
        env:
          BASE_PATH: /Qonnectra-docs/${{ env.PREVIEW_ID }}/
      
      - name: Store built files
        run: |
          # Store built files outside of git working directory
          cp -r .vitepress/dist /tmp/preview-dist
      
      - name: Configure Git
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
      
      - name: Checkout preview branch
        run: |
          # Fetch the preview branch if it exists
          git fetch origin gh-pages-preview:gh-pages-preview 2>/dev/null || true
          # Switch to preview branch or create it
          if git show-ref --verify --quiet refs/heads/gh-pages-preview; then
            git checkout gh-pages-preview
          else
            git checkout --orphan gh-pages-preview
            git rm -rf . 2>/dev/null || true
          fi
      
      - name: Deploy to Preview Branch
        run: |
          OUTPUT_DIR="${{ env.PREVIEW_ID }}"
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            COMMIT_MSG="Deploy preview for PR #${{ github.event.pull_request.number }} [skip ci]"
          else
            COMMIT_MSG="Deploy preview for branch ${{ github.ref_name }} [skip ci]"
          fi
          # Remove existing directory if it exists
          rm -rf "$OUTPUT_DIR"
          # Copy stored built files to output directory
          cp -r /tmp/preview-dist "$OUTPUT_DIR"
          # Create .nojekyll file at root to disable Jekyll processing (if it doesn't exist)
          if [ ! -f .nojekyll ]; then
            touch .nojekyll
          fi
          # Generate index.html listing all previews
          PREVIEW_DIRS=$(find . -maxdepth 1 -type d ! -name '.' ! -name '.git' | sed 's|^\./||' | sort)
          {
            echo '<!DOCTYPE html>'
            echo '<html lang="en">'
            echo '<head>'
            echo '  <meta charset="UTF-8">'
            echo '  <meta name="viewport" content="width=device-width, initial-scale=1.0">'
            echo '  <title>Documentation Previews</title>'
            echo '  <style>'
            echo '    body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }'
            echo '    h1 { color: #333; }'
            echo '    ul { list-style: none; padding: 0; }'
            echo '    li { margin: 0.5rem 0; }'
            echo '    a { color: #0969da; text-decoration: none; }'
            echo '    a:hover { text-decoration: underline; }'
            echo '    .branch { color: #0550ae; }'
            echo '    .pr { color: #953800; }'
            echo '  </style>'
            echo '</head>'
            echo '<body>'
            echo '  <h1>Documentation Previews</h1>'
            echo '  <p>Select a preview to view:</p>'
            echo '  <ul>'
            for dir in $PREVIEW_DIRS; do
              class="branch"
              label="$dir"
              if [[ "$dir" == pr-* ]]; then
                class="pr"
                num="${dir#pr-}"
                label="PR #$num"
              elif [[ "$dir" == branch-* ]]; then
                branch="${dir#branch-}"
                label="$branch"
                [[ "$branch" == "main" ]] && label="main (default)"
              fi
              echo "    <li class=\"$class\"><a href=\"$dir/\">$label</a></li>"
            done
            echo '  </ul>'
            echo '</body>'
            echo '</html>'
          } > index.html
          # Stage changes
          git add "$OUTPUT_DIR"
          git add index.html
          git add -f .nojekyll 2>/dev/null || git add .nojekyll
          # Commit if there are changes
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "$COMMIT_MSG"
            git push origin gh-pages-preview
          fi
      
      - name: Comment PR with Preview URL
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const previewId = process.env.PREVIEW_ID;
            const prNumber = context.payload.pull_request.number;
            const previewUrl = `https://geodock-gmbh.github.io/Qonnectra-docs/${previewId}/`;
            const commentBody = `🚀 **Preview deployed!**\n\n📖 Documentation preview: ${previewUrl}\n\n⚠️ **Note**: To enable PR previews, you need to configure GitHub Pages to serve from the \`gh-pages-preview\` branch in Repository Settings → Pages.\n\nThis preview will be updated automatically when you push new commits.`;
            
            // Find existing preview comment
            const comments = await github.rest.issues.listComments({
              issue_number: prNumber,
              owner: context.repo.owner,
              repo: context.repo.repo,
            });
            
            const existingComment = comments.data.find(comment => 
              (comment.user.type === 'Bot' || comment.user.login === 'github-actions[bot]') && 
              comment.body.includes('Preview deployed!')
            );
            
            if (existingComment) {
              // Update existing comment
              await github.rest.issues.updateComment({
                comment_id: existingComment.id,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody
              });
            } else {
              // Create new comment if none exists
              await github.rest.issues.createComment({
                issue_number: prNumber,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: commentBody
              });
            }

